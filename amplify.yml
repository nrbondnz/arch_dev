version: 1
backend:
  phases:
    build:
      commands:
        - npm install --cache .npm --prefer-offline
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
  cache:
    paths:
      - .npm/**/*
frontend:
  phases:
    build:
      commands:
        - echo "No web frontend – Flutter app built and distributed separately"
  artifacts:
    baseDirectory: /
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*
